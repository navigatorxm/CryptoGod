name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Build
        run: yarn build
        env:
          NEXT_PUBLIC_APP_NAME: CryptoGod Dashboard
          NEXT_PUBLIC_APP_URL: https://xmone.xyz
          NEXT_PUBLIC_ADMIN_WALLET: ${{ secrets.NEXT_PUBLIC_ADMIN_WALLET || '0x85D697bC39a61f25a4075eD834B82b4d2Cc41c40' }}
          NEXT_PUBLIC_ADMIN_WALLET_2: ${{ secrets.NEXT_PUBLIC_ADMIN_WALLET_2 || '0x3724A3179657c0aD23Eb3Fb4F7e2F176f490280e' }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID || 'ci_placeholder' }}
          NEXT_PUBLIC_ETHEREUM_RPC: https://eth.llamarpc.com
          NEXT_PUBLIC_BSC_RPC: https://bsc-dataseed1.binance.org
          NEXT_PUBLIC_POLYGON_RPC: https://polygon-rpc.com
          NEXT_PUBLIC_AVALANCHE_RPC: https://api.avax.network/ext/bc/C/rpc
          NEXT_PUBLIC_ARBITRUM_RPC: https://arb1.arbitrum.io/rpc
          NEXT_PUBLIC_OPTIMISM_RPC: https://mainnet.optimism.io
          NEXT_PUBLIC_ENABLE_MAINNET: 'true'
          NEXT_PUBLIC_ENABLE_TESTNET: 'true'
          NEXT_PUBLIC_DEMO_MODE: 'false'
