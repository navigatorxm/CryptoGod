name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on new commits
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    
    # Cache configuration for faster builds
    env:
      TURBO_CACHE_DIR: .turbo
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.next/cache
            ${{ github.workspace }}/.turbo
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.{ts,tsx}') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_NAME: CryptoGod Dashboard
          NEXT_PUBLIC_APP_URL: https://xmone.xyz
          NEXT_PUBLIC_ADMIN_WALLET: ${{ secrets.NEXT_PUBLIC_ADMIN_WALLET || '0x85D697bC39a61f25a4075eD834B82b4d2Cc41c40' }}
          NEXT_PUBLIC_ADMIN_WALLET_2: ${{ secrets.NEXT_PUBLIC_ADMIN_WALLET_2 || '0x3724A3179657c0aD23Eb3Fb4F7e2F176f490280e' }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID || 'ci_placeholder' }}
          NEXT_PUBLIC_ETHEREUM_RPC: https://eth.llamarpc.com
          NEXT_PUBLIC_BSC_RPC: https://bsc-dataseed1.binance.org
          NEXT_PUBLIC_POLYGON_RPC: https://polygon-rpc.com
          NEXT_PUBLIC_AVALANCHE_RPC: https://api.avax.network/ext/bc/C/rpc
          NEXT_PUBLIC_ARBITRUM_RPC: https://arb1.arbitrum.io/rpc
          NEXT_PUBLIC_OPTIMISM_RPC: https://mainnet.optimism.io
          NEXT_PUBLIC_ENABLE_MAINNET: 'true'
          NEXT_PUBLIC_ENABLE_TESTNET: 'true'
          NEXT_PUBLIC_DEMO_MODE: 'false'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request'
        with:
          name: build-output
          path: .next
          retention-days: 7
